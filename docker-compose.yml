version: '3.8'

services:
  train-catcher:
    build: .
    container_name: train-catcher
    ports:
      - "3300:3300"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./.env:/.env:ro
    restart: unless-stopped
    # For Raspberry Pi, you may want to limit resources:
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 256M
